name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore dependencies
        run: dotnet restore MembershipPlatform.sln

      - name: Build
        run: dotnet build MembershipPlatform.sln --no-restore -c Release

      - name: Unit Tests
        run: dotnet test tests/MembershipService.UnitTests --no-build -c Release --logger "trx;LogFileName=unit-tests.trx"

      - name: Integration Tests
        run: dotnet test tests/MembershipService.IntegrationTests --no-build -c Release --logger "trx;LogFileName=integration-tests.trx"

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t membership-platform:${{ github.sha }} .
